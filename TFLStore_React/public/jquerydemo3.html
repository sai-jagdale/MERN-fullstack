<DOCTYPE! html>
    <html>
        <head>  
            <title>Jquery Demo 3 -Different types of input elements</title>
            <script src="scripts/jquery.min.js"></script>
        </head>
        <body>
            <h1>Different types of input elements</h1>
            
            <form action="/api/register" method="POST">
                <input type="text" value="transflower" name="Name"/>
                <br/>
                <input type="date" name="resultdate"/>
                <br/>
                Passed : <input type="checkbox" value="passed" name="result"/>
                <br/>
                <p>Selected Education : </p>
                    <input type="radio" name="Education" value="Graduate"> Graduate
                    <input type="radio" name="Education" value="Post Graduate"> Post Graduate
                    <input type="radio" name="Education" value="Phd"> Phd
                <br/>
                <button type="submit">Register</button>
            </form>             
        </body>
    </html>
